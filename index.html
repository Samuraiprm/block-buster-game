<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Блок Бастер - Головоломка</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Блок Бастер</h1>
            <div class="stats">
                <div class="stat">
                    <span class="label">Уровень</span>
                    <span id="level" class="value">1</span>
                </div>
                <div class="stat">
                    <span class="label">Очки</span>
                    <span id="score" class="value">0</span>
                </div>
                <div class="stat">
                    <span class="label">Ходы</span>
                    <span id="moves" class="value">0</span>
                </div>
            </div>
        </header>

        <main>
            <div id="game-board"></div>
            
            <div class="controls">
                <button id="hint-btn" class="btn hint">
                    <span class="icon">💡</span>
                    <span class="text">Подсказка</span>
                    <span id="hints-count" class="badge">∞</span>
                </button>
                <button id="new-game-btn" class="btn new-game">
                    <span class="icon">🔄</span>
                    <span class="text">Новый уровень</span>
                </button>
                <button id="reset-btn" class="btn reset">
                    <span class="icon">◀️</span>
                    <span class="text">Начать сначала</span>
                </button>
            </div>
        </main>

        <div id="message" class="hidden"></div>
    </div>

    <script src="game.js"></script>
</body>
</html>
